name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # bisa dijalankan manual dari tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Hanya satu deploy berjalan; deploy baru membatalkan yang lama.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Situs dilayani di /<nama-repo>/, cocok untuk GitHub Pages project site.
          VITE_BASE: /${{ github.event.repository.name }}/
      # Fallback SPA: refresh di /materials dll tidak 404.
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
